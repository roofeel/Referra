providers = ["node"]

[phases.setup]
nixPkgs = ["bun", "openssl"]
aptPkgs = ["libssl3", "openssl"]

[phases.install]
cmds = ["cd api && bun install"]

[start]
cmd = "OPENSSL_LIB=$(find /nix/store -path '*/lib/libssl.so.3' | head -n 1) && if [ -n \"$OPENSSL_LIB\" ]; then export LD_LIBRARY_PATH=\"$(dirname \"$OPENSSL_LIB\")${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}\"; fi && cd api && bun run start"
